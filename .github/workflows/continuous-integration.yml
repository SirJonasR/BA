name: Continuous Integration

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Check quarkus application.properties for quarkus.security.jaxrs.default-roles-allowed property
        run: |
          if grep -Pq '^quarkus.security.jaxrs.default-roles-allowed=\*\*\r?$' backend/src/main/resources/application.properties; then
            echo "Property quarkus.security.jaxrs.default-roles-allowed is set correctly"
          else
            echo "Property quarkus.security.jaxrs.default-roles-allowed=** is NOT set!"
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "adopt"

      - name: Setup Maven
        uses: stCarolas/setup-maven@v4.5
        with:
          maven-version: 3.9.9

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Install Docker Compose
        run: sudo apt-get update && sudo apt-get install -y docker-compose

      - name: Start Service Containers
        run: docker-compose up -d

      - name: Run Unit and Integration Tests
        working-directory: backend
        run: mvn verify

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "adopt"

      - name: Use Node version 18
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install npm dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Angular CLI
        run: npm install -g @angular/cli > /dev/null 

      - name: Run EsLint & Prettier
        working-directory: frontend
        run: ng lint

      - name: Generate Documentation
        working-directory: frontend
        run: npm run compodoc

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Install Docker Compose
        run: sudo apt-get update && sudo apt-get install -y docker-compose

      - name: Start Service Containers
        run: docker-compose up -d

      - name: Start Backend Dev Server (in background)
        working-directory: backend
        run: mvn quarkus:dev &

      - name: Run Component Tests
        working-directory: frontend
        run: npm run test -- --browsers=ChromeHeadless --watch=false

