apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: tecradar-backend
  name: tecradar-backend

spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tecradar-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tecradar-backend
    spec:
      containers:
        - image: ghcr.io/de-ams-ad-tecunivers/tecradar-backend:release-1.5.1
          envFrom:
            - configMapRef:
                name: proxy
            - configMapRef:
                name: tecradar-config
          env:
            - name: QUARKUS_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  key: app-username
                  name: postgres
            - name: QUARKUS_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: app-password
                  name: postgres
            - name: QUARKUS_OIDC_CREDENTIALS_SECRET
              valueFrom:
                secretKeyRef:
                  key: backend-client-secret
                  name: keycloak
            - name: QUARKUS_DATASOURCE_PG_USERNAME
              valueFrom:
                secretKeyRef:
                  key: pg-username
                  name: postgres
            - name: QUARKUS_DATASOURCE_PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: pg-password
                  name: postgres
            - name: DEPLOYMENT_ENVIRONMENT
              value: "prod"
          imagePullPolicy: Always
          name: tecradar-backend
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
      imagePullSecrets:
        - name: github-pull