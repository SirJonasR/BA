apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: tecradar-frontend
  name: tecradar-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tecradar-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tecradar-frontend
    spec:
      containers:
        - name: tecradar-frontend
          envFrom:
            - configMapRef:
                name: proxy
          image: ghcr.io/de-ams-ad-tecunivers/tecradar-frontend:release-1.5.1
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
      imagePullSecrets:
        - name: github-pull
