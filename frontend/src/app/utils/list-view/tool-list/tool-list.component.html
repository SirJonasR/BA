<div class="mat-elevation-z8">
  <table
    mat-table
    [dataSource]="dataSource"
    matSort
    data-test-id="technology-list"
  >
    <ng-container matColumnDef="picture">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let element">
        <div *ngIf="element.hasLogo">
          <img [src]="loadedLogos[element.pictureId]" class="img" alt="" />
        </div>
        <div *ngIf="element.hasLogo === false">
          <img [src]="'assets/defaultLogo.jpg'" class="img" alt="" />
        </div>
      </td>
    </ng-container>

    <ng-container matColumnDef="name">
      <th
        mat-header-cell
        *matHeaderCellDef
        mat-sort-header
        sortActionDescription="Sort by name"
      >
        Name
      </th>
      <td mat-cell *matCellDef="let element">
        <span class="name">
          {{ element.name }}
        </span>
      </td>
    </ng-container>

    <ng-container matColumnDef="category">
      <th
        mat-header-cell
        *matHeaderCellDef
        mat-sort-header
        sortActionDescription="Sort by category"
      >
        Kategorie
      </th>
      <td mat-cell *matCellDef="let element">{{ element.category }}</td>
    </ng-container>

    <ng-container matColumnDef="lifecycle">
      <th
        mat-header-cell
        *matHeaderCellDef
        mat-sort-header
        sortActionDescription="Sort by lifecycle"
      >
        Lebenszyklus
      </th>
      <td mat-cell *matCellDef="let element">{{ element.lifecycle }}</td>
    </ng-container>

    <ng-container matColumnDef="tags">
      <th mat-header-cell *matHeaderCellDef>Tags</th>
      <td mat-cell *matCellDef="let element">{{ element.tags }}</td>
    </ng-container>

    <ng-container matColumnDef="projects">
      <th mat-header-cell *matHeaderCellDef>Projekte</th>
      <td mat-cell *matCellDef="let element">{{ element.projectNames }}</td>
    </ng-container>

    <ng-container matColumnDef="customers">
      <th mat-header-cell *matHeaderCellDef>Kunden / Auftraggeber</th>
      <td mat-cell *matCellDef="let element">{{ element.customers }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr
      class="row1"
      mat-row
      *matRowDef="let row; columns: displayedColumns"
      (click)="navigate(row)"
    ></tr>
  </table>

  <mat-paginator
    [pageSizeOptions]="[10, 25, 100]"
    showFirstLastButtons
    aria-label="Wähle die Seite mit den Technolgien aus"
  >
  </mat-paginator>
</div>
