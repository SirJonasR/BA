<h1 mat-dialog-title>{{ dialogData.resourceType }} löschen</h1>
<div mat-dialog-content>
  <p>
    Möchtest du
    <strong>{{ dialogData.resourceName }}</strong> wirklich unwiderruflich
    löschen?
  </p>
</div>
<div mat-dialog-actions class="action-buttons">
  <button
    mat-button
    (click)="onAbort()"
    cdkFocusInitial
    data-test-id="delete-confirmation-abort-button"
  >
    Abbrechen
  </button>
  <button
    mat-raised-button
    color="warn"
    (click)="onConfirm()"
    data-test-id="delete-confirmation-confirm-button"
  >
    Löschen
  </button>
</div>
