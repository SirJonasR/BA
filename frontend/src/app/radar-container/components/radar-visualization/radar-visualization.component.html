<div class="radar-visualization-container">
  <!-- Main Radar SVG Container -->
  <div #radarWrapper class="radar-wrapper">
    <svg
      #radarSvg
      id="radar"
      data-test-id="radar-container"
      viewBox="0 0 1500 1050"
      preserveAspectRatio="xMidYMid meet"
      class="radar-svg"
    ></svg>
  </div>

  <!-- Optional: Add a subtle bottom fade for visual polish -->
  <div class="radar-fade-overlay"></div>
</div>
